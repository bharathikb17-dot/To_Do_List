<!DOCTYPE html>
<html>
<head>
  <title>Smart ToDo App</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#317EFB">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }

    .task {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .category {
      font-size: 12px;
      color: blue;
    }

    .due {
      font-size: 12px;
      color: red;
    }
  </style>
</head>
<body>

  <h2>Smart ToDo List</h2>

  <!-- Task Input -->
  <input type="text" id="taskInput" placeholder="Enter task">

  <!-- Due Date Input -->
  <input type="date" id="dueDate">

  <button onclick="addTask()">Add Task</button>

  <div id="taskList"></div>

  <script>
    const taskList = document.getElementById("taskList");

    // Load tasks from localStorage
    window.onload = function() {
      const savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      savedTasks.forEach(task => displayTask(task));
    };

    async function addTask() {
      const taskText = document.getElementById("taskInput").value;
      const dueDate = document.getElementById("dueDate").value;

      if (!taskText) return;

      // Call Netlify function for category
      const response = await fetch('/.netlify/functions/categorize', {
        method: "POST",
        body: JSON.stringify({ text: taskText })
      });

      const data = await response.json();
      const category = data.category || "Other";

      const task = {
        text: taskText,
        category: category,
        dueDate: dueDate
      };

      saveTask(task);
      displayTask(task);

      document.getElementById("taskInput").value = "";
      document.getElementById("dueDate").value = "";
    }

    function displayTask(task) {
      const div = document.createElement("div");
      div.className = "task";

      div.innerHTML = `
        <strong>${task.text}</strong>
        <div class="category">Category: ${task.category}</div>
        <div class="due">Due: ${task.dueDate || "No date set"}</div>
      `;

      taskList.appendChild(div);
    }

    function saveTask(task) {
      const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      tasks.push(task);
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    // Register service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>

</body>
</html>

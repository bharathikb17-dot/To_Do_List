<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI To-Do</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 600px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.add-btn {
    background: #3b82f6;
    color: white;
}

.task {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task.completed span {
    text-decoration: line-through;
    opacity: 0.6;
}

.category {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
}

.task-buttons {
    display: flex;
    gap: 8px;
}

.complete-btn {
    background: #22c55e;
    color: white;
}

.delete-btn {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Smart To-Do List 🤖</h1>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter your task...">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div id="taskList"></div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

async function categorizeTask(taskText) {
    try {
        const response = await fetch("/.netlify/functions/categorize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task: taskText })
        });

        const data = await response.json();
        return data.category || "Other";
    } catch (error) {
        return "Other";
    }
}

async function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";

    const category = await categorizeTask(text);

    const newTask = {
        id: Date.now(),
        text,
        completed: false,
        category
    };

    tasks.push(newTask);
    saveTasks();
    renderTasks();
}

function toggleTask(id) {
    tasks = tasks.map(task =>
        task.id === id ? { ...task, completed: !task.completed } : task
    );
    saveTasks();
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveTasks();
    renderTasks();
}

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task" + (task.completed ? " completed" : "");

        div.innerHTML = `
            <div>
                <span>${task.text}</span>
                <div class="category">Category: ${task.category}</div>
            </div>
            <div class="task-buttons">
                <button class="complete-btn" onclick="toggleTask(${task.id})">
                    ${task.completed ? "Undo" : "Done"}
                </button>
                <button class="delete-btn" onclick="deleteTask(${task.id})">
                    Delete
                </button>
            </div>
        `;
        list.appendChild(div);
    });
}

renderTasks();

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart To-Do List</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  padding: 20px;
}

h1 {
  text-align: center;
}

.input-card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  max-width: 650px;
  margin: auto;
  margin-bottom: 30px;
}

.form-group {
  margin-bottom: 18px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

input, select {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.full-width {
  width: 100%;
}

.row {
  display: flex;
  gap: 20px;
}

.col {
  flex: 1;
}

.time-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.time-row input {
  width: 60px;
  text-align: center;
}

.time-row select {
  width: 80px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  width: 100%;
}

button:hover {
  background: #45a049;
}

.task-list {
  max-width: 750px;
  margin: auto;
}

.task-item {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s ease;
}

.task-left {
  flex: 1;
}

.completed {
  text-decoration: line-through;
  color: gray;
}

.overdue {
  border-left: 6px solid red;
  background: #ffeaea;
}

.badge {
  background: red;
  color: white;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 10px;
}

.icon-btn {
  cursor: pointer;
  font-size: 18px;
  margin-left: 12px;
}
</style>
</head>

<body>

<h1>Smart To-Do List</h1>

<div class="input-card">

  <div class="form-group">
    <label>Task Name</label>
    <input type="text" id="taskInput" class="full-width" placeholder="Enter your task..." />
  </div>

  <div class="row">
    <div class="col">
      <label>Due Date</label>
      <input type="date" id="taskDate" class="full-width">
    </div>

    <div class="col">
      <label>Reminder Time (12-hour format)</label>
      <div class="time-row">
        <input type="number" id="taskHour" min="1" max="12" placeholder="HH">
        <span>:</span>
        <input type="number" id="taskMinute" min="0" max="59" placeholder="MM">
        <select id="taskAmPm">
          <option>AM</option>
          <option>PM</option>
        </select>
      </div>
    </div>
  </div>

  <br>
  <button onclick="addTask()">Add Task</button>
</div>

<div class="task-list" id="taskList"></div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// Ask notification permission
if ("Notification" in window && Notification.permission !== "granted") {
  Notification.requestPermission();
}

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function formatDateTime(dateObj) {
  if (!dateObj) return "No due date";

  let hours = dateObj.getHours();
  let minutes = dateObj.getMinutes();
  let ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;
  minutes = minutes < 10 ? '0' + minutes : minutes;

  return dateObj.toDateString() + " - " + hours + ":" + minutes + " " + ampm;
}

async function addTask() {
  const taskText = document.getElementById("taskInput").value;
  const date = document.getElementById("taskDate").value;
  const hour = document.getElementById("taskHour").value;
  const minute = document.getElementById("taskMinute").value;
  const ampm = document.getElementById("taskAmPm").value;

  if (!taskText) {
    alert("Please enter task name.");
    return;
  }

  let dueDateTime = null;

  if (date && hour && minute !== "") {
    let hour24 = parseInt(hour);
    if (ampm === "PM" && hour24 !== 12) hour24 += 12;
    if (ampm === "AM" && hour24 === 12) hour24 = 0;

    dueDateTime = new Date(`${date}T${hour24.toString().padStart(2,"0")}:${minute.padStart(2,"0")}`);
  }

  let category = "Other";
  try {
    const response = await fetch("/.netlify/functions/categorize", {
      method: "POST",
      body: JSON.stringify({ task: taskText })
    });
    const data = await response.json();
    category = data.category || "Other";
  } catch (e) {
    console.log("LLM not reachable");
  }

  tasks.push({
    text: taskText,
    due: dueDateTime,
    category: category,
    completed: false,
    notified: false
  });

  saveTasks();
  renderTasks();

  document.getElementById("taskInput").value = "";
  document.getElementById("taskDate").value = "";
  document.getElementById("taskHour").value = "";
  document.getElementById("taskMinute").value = "";
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const now = new Date();
    const dueDate = task.due ? new Date(task.due) : null;
    const isOverdue = dueDate && now > dueDate && !task.completed;

    const div = document.createElement("div");
    div.className = "task-item";
    if (isOverdue) div.classList.add("overdue");

    div.innerHTML = `
      <div class="task-left ${task.completed ? "completed" : ""}">
        <strong>${task.text}</strong><br>
        ${formatDateTime(dueDate)}
        ${isOverdue ? '<span class="badge">OVERDUE</span>' : ""}
        <br><small>Category: ${task.category}</small>
      </div>
      <div>
        <span class="icon-btn" onclick="toggleComplete(${index})">✔</span>
        <span class="icon-btn" onclick="deleteTask(${index})">🗑</span>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleComplete(index) {
  tasks[index].completed = !tasks[index].completed;
  saveTasks();
  renderTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  renderTasks();
}

// 🔔 Reminder Checker (runs every 20 seconds)
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    if (!task.completed && task.due && !task.notified) {
      const due = new Date(task.due);

      if (now >= due) {
        if (Notification.permission === "granted") {
          new Notification("⏰ Task Reminder", {
            body: task.text,
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
          });
        }

        task.notified = true;
        saveTasks();
      }
    }
  });

  renderTasks();

}, 20000);

renderTasks();
</script>

</body>
</html>

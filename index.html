<!DOCTYPE html>
<html>
<head>
  <title>Smart AI ToDo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4f46e5">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h2 { margin-bottom: 5px; }

    .info {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .task {
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      background: #f9fafb;
      border-left: 5px solid #4f46e5;
      display: flex;
      justify-content: space-between;
      align-items: start;
    }

    .task-left {
      flex: 1;
    }

    .task.completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .overdue {
      border-left: 5px solid red;
      background: #fff0f0;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      color: white;
      margin-left: 8px;
    }

    .overdue-badge { background: red; }

    .motivation {
      font-size: 13px;
      margin-top: 6px;
      color: #4f46e5;
    }

    .icons {
      display: flex;
      gap: 10px;
      cursor: pointer;
    }

    .icon-btn {
      width: 18px;
      height: 18px;
      color: #666;
    }

    .icon-btn:hover {
      color: #4f46e5;
    }

    #aiSummary {
      margin-top: 15px;
      font-weight: 600;
      color: #e11d48;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Smart AI ToDo</h2>
  <div class="info">
    ⏰ Select date & time (12-hour format). You’ll get a reminder at that time.
  </div>

  <input type="text" id="taskInput" placeholder="Enter your task...">
  <input type="datetime-local" id="dueDate">
  <button onclick="addTask()">Add Task</button>

  <div id="aiSummary"></div>
  <div id="taskList"></div>
</div>

<script>

const taskList = document.getElementById("taskList");

if ("Notification" in window) {
  Notification.requestPermission();
}

function formatTo12Hour(dateString) {
  if (!dateString) return "No date set";
  const date = new Date(dateString);
  return date.toLocaleString("en-US", {
    hour: "numeric",
    minute: "numeric",
    hour12: true,
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}

window.onload = function () {
  renderTasks();
  updateAISummary();
  setInterval(checkReminders, 60000);
};

async function addTask() {
  const text = document.getElementById("taskInput").value;
  const dueDate = document.getElementById("dueDate").value;
  if (!text) return;

  const response = await fetch('/.netlify/functions/categorize', {
    method: "POST",
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  const task = {
    id: Date.now(),
    text,
    dueDate,
    category: data.category,
    motivation: data.motivation,
    completed: false,
    notified: false
  };

  const tasks = getTasks();
  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));

  renderTasks();
  updateAISummary();

  document.getElementById("taskInput").value = "";
  document.getElementById("dueDate").value = "";
}

function getTasks() {
  return JSON.parse(localStorage.getItem("tasks")) || [];
}

function renderTasks() {
  taskList.innerHTML = "";
  const tasks = getTasks();
  tasks.forEach(displayTask);
  lucide.createIcons();
}

function displayTask(task) {
  const div = document.createElement("div");
  div.className = "task";

  if (task.completed) div.classList.add("completed");

  const now = new Date();
  const due = new Date(task.dueDate);

  let badge = "";
  if (task.dueDate && due < now && !task.completed) {
    div.classList.add("overdue");
    badge = `<span class="badge overdue-badge">OVERDUE</span>`;
  }

  div.innerHTML = `
    <div class="task-left">
      <strong>${task.text}</strong> ${badge}
      <div>Category: ${task.category}</div>
      <div>Due: ${formatTo12Hour(task.dueDate)}</div>
      <div class="motivation">🤖 ${task.motivation}</div>
    </div>
    <div class="icons">
      <i data-lucide="check" class="icon-btn" onclick="toggleComplete(${task.id})"></i>
      <i data-lucide="trash-2" class="icon-btn" onclick="deleteTask(${task.id})"></i>
    </div>
  `;

  taskList.appendChild(div);
}

function toggleComplete(id) {
  const tasks = getTasks();
  const task = tasks.find(t => t.id === id);
  task.completed = !task.completed;
  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
  updateAISummary();
}

function deleteTask(id) {
  let tasks = getTasks();
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
  updateAISummary();
}

function checkReminders() {
  const tasks = getTasks();
  const now = new Date();

  tasks.forEach(task => {
    if (task.dueDate && !task.notified && !task.completed) {
      const due = new Date(task.dueDate);
      if (due <= now) {
        if (Notification.permission === "granted") {
          new Notification("⏰ Task Reminder", { body: task.text });
        }
        task.notified = true;
      }
    }
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function updateAISummary() {
  const tasks = getTasks();
  const now = new Date();
  const overdue = tasks.filter(t => t.dueDate && new Date(t.dueDate) < now && !t.completed).length;

  const summary = document.getElementById("aiSummary");

  if (overdue > 0) {
    summary.innerText = `⚠ You have ${overdue} overdue task(s). Let's take action!`;
  } else {
    summary.innerText = "✅ You're on track. Keep going!";
  }
}

</script>

</body>
</html>
